<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dagadya | Call Playback</title>
    <script src="https://unpkg.com/wavesurfer.js"></script>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap");

        :root {
            --bg-1: #071a12;
            --bg-2: #0f2e1f;
            --panel: rgba(9, 31, 21, 0.74);
            --panel-border: rgba(191, 255, 220, 0.2);
            --text-main: #f4fff8;
            --text-soft: #b2dbc1;
            --accent: #4ef08a;
            --accent-2: #8cffaf;
            --danger: #ff8f8f;
            --ring: rgba(102, 255, 171, 0.45);
            --shadow: 0 18px 60px rgba(4, 17, 11, 0.55);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Sora", sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(circle at 16% 20%, rgba(78, 240, 138, 0.22), transparent 30%),
                radial-gradient(circle at 85% 82%, rgba(140, 255, 175, 0.12), transparent 28%),
                linear-gradient(145deg, var(--bg-1), var(--bg-2));
            display: grid;
            place-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: linear-gradient(transparent 96%, rgba(255, 255, 255, 0.03) 100%);
            background-size: 100% 30px;
            pointer-events: none;
        }

        .app {
            width: min(760px, 100%);
            border: 1px solid var(--panel-border);
            border-radius: 26px;
            background: var(--panel);
            backdrop-filter: blur(14px);
            box-shadow: var(--shadow);
            padding: clamp(20px, 4vw, 38px);
            position: relative;
            isolation: isolate;
        }

        .app::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 26px;
            padding: 1px;
            background: linear-gradient(140deg, rgba(140, 255, 175, 0.42), rgba(78, 240, 138, 0.12), transparent);
            mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            z-index: -1;
        }

        .title {
            margin: 0;
            font-family: "Space Grotesk", sans-serif;
            letter-spacing: 0.5px;
            font-size: clamp(2rem, 4vw, 2.9rem);
            line-height: 1.1;
        }

        .subtitle {
            margin: 10px 0 22px;
            color: var(--text-soft);
            font-size: clamp(0.95rem, 1.6vw, 1.05rem);
        }

        .playback-container {
            border-radius: 18px;
            background: rgba(9, 34, 23, 0.75);
            border: 1px solid rgba(141, 255, 179, 0.25);
            padding: 26px 18px;
            position: relative;
            overflow: hidden;
        }

        .recording-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(141, 255, 179, 0.15);
        }

        .recording-title {
            font-family: "Space Grotesk", sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
            margin: 0;
        }

        .recording-duration {
            color: var(--text-soft);
            font-size: 0.9rem;
        }

        #waveform {
            margin: 20px 0;
            border-radius: 12px;
            overflow: hidden;
        }

        .wave-container {
            width: 100%;
            height: 120px;
            position: relative;
            background: rgba(7, 26, 18, 0.5);
            border-radius: 12px;
            border: 1px solid rgba(141, 255, 179, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Waving bars animation */
        .wave-bars {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 3px;
            height: 100%;
            width: 100%;
            padding: 0 10px;
        }

        .wave-bar {
            width: 3px;
            background: linear-gradient(180deg, #52f28e, #35ca70);
            border-radius: 2px;
            animation: wave 0.8s ease-in-out infinite;
        }

        @keyframes wave {
            0%, 100% { height: 20%; }
            50% { height: 80%; }
        }

        .wave-bar:nth-child(1) { animation-delay: 0s; }
        .wave-bar:nth-child(2) { animation-delay: 0.1s; }
        .wave-bar:nth-child(3) { animation-delay: 0.2s; }
        .wave-bar:nth-child(4) { animation-delay: 0.3s; }
        .wave-bar:nth-child(5) { animation-delay: 0.4s; }
        .wave-bar:nth-child(6) { animation-delay: 0.5s; }
        .wave-bar:nth-child(7) { animation-delay: 0.6s; }
        .wave-bar:nth-child(8) { animation-delay: 0.7s; }
        .wave-bar:nth-child(9) { animation-delay: 0.8s; }
        .wave-bar:nth-child(10) { animation-delay: 0.9s; }
        .wave-bar:nth-child(11) { animation-delay: 1s; }
        .wave-bar:nth-child(12) { animation-delay: 1.1s; }

        .wave-loading {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-soft);
            font-size: 0.95rem;
        }

        .loading-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: blink 1.4s infinite;
        }

        .loading-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid rgba(141, 255, 179, 0.15);
        }

        .play-btn {
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(120deg, #52f28e, #35ca70);
            color: #032311;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s ease, filter 0.2s ease;
            font-size: 1.2rem;
        }

        .play-btn:hover {
            filter: brightness(1.04);
            transform: scale(1.05);
        }

        .play-btn:active {
            transform: scale(0.98);
        }

        .play-btn.playing {
            background: linear-gradient(120deg, #ff9944, #ff7722);
        }

        .time-display {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-soft);
            font-size: 0.9rem;
            font-family: "Space Grotesk", sans-serif;
            font-weight: 500;
        }

        .current-time {
            min-width: 40px;
        }

        .total-time {
            min-width: 40px;
            text-align: right;
        }

        .progress-bar {
            flex: 1;
            height: 4px;
            background: rgba(141, 255, 179, 0.2);
            border-radius: 999px;
            margin: 0 12px;
            position: relative;
            cursor: pointer;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #52f28e, #35ca70);
            border-radius: 999px;
            transition: width 0.05s linear;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .volume-slider {
            width: 80px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(141, 255, 179, 0.2);
            border-radius: 999px;
            outline: none;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .volume-slider::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .volume-slider::-webkit-slider-thumb:hover {
            transform: scale(1.3);
        }

        .volume-slider::-moz-range-thumb:hover {
            transform: scale(1.3);
        }

        .status-info {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 12px;
            background: rgba(78, 240, 138, 0.08);
            border: 1px solid rgba(78, 240, 138, 0.2);
            color: var(--text-soft);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
        }

        .status-indicator.loading {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .download-btn {
            margin-top: 16px;
            padding: 12px 18px;
            border: none;
            border-radius: 12px;
            background: rgba(78, 240, 138, 0.12);
            border: 1px solid rgba(78, 240, 138, 0.3);
            color: var(--accent);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            font-size: 0.95rem;
        }

        .download-btn:hover {
            background: rgba(78, 240, 138, 0.2);
            transform: translateY(-1px);
        }

        @media (max-width: 640px) {
            .controls {
                flex-wrap: wrap;
            }

            .volume-control {
                width: 100%;
                order: 3;
            }

            .time-display {
                order: 2;
            }

            .recording-info {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
        }

        /* WaveSurfer specific styling */
        ::-webkit-scrollbar {
            height: 4px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(141, 255, 179, 0.1);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(78, 240, 138, 0.4);
            border-radius: 999px;
        }
    </style>
</head>
<body>
    <main class="app" id="app">
        <h1 class="title">Call Playback</h1>
        <p class="subtitle">Review your recent farmer assistance call recording with interactive waveform visualization.</p>

        <section class="playback-container">
            <div class="recording-info">
                <h2 class="recording-title" id="recordingTitle">Loading call recording...</h2>
                <span class="recording-duration" id="recordingDuration">--:--</span>
            </div>

            <div id="waveform" class="wave-container">
                <div class="wave-bars">
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                </div>
            </div>

            <div class="controls">
                <button class="play-btn" id="playBtn" title="Play/Pause">▶</button>
                <span class="current-time" id="currentTime">0:00</span>
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
                <span class="total-time" id="totalTime">0:00</span>
                <div class="volume-control">
                    <span style="font-size: 0.8rem;">🔊</span>
                    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="100">
                </div>
            </div>

            <div class="status-info">
                <span class="status-indicator loading"></span>
                <span id="statusText">Preparing audio playback...</span>
            </div>
        </section>
    </main>

    <script>
        let wavesurfer = null;
        let audioUrl = null;

        const playBtn = document.getElementById('playBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const volumeSlider = document.getElementById('volumeSlider');
        const statusText = document.getElementById('statusText');
        const recordingTitle = document.getElementById('recordingTitle');
        const recordingDuration = document.getElementById('recordingDuration');
        const waveformContainer = document.getElementById('waveform');

        function formatTime(seconds) {
            if (!isFinite(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        function initializeWaveSurfer() {
            wavesurfer = WaveSurfer.create({
                container: waveformContainer,
                waveColor: '#4ef08a',
                progressColor: '#35ca70',
                barWidth: 2,
                barGap: 2,
                barRadius: 2,
                height: 120,
                normalize: true,
                responsive: true,
            });

            wavesurfer.on('ready', () => {
                statusText.textContent = 'Ready to play - Click the play button to start';
                statusText.parentElement.querySelector('.status-indicator').classList.remove('loading');

                const duration = wavesurfer.getDuration();
                totalTimeEl.textContent = formatTime(duration);
                recordingDuration.textContent = `Duration: ${formatTime(duration)}`;
            });

            wavesurfer.on('play', () => {
                playBtn.textContent = '⏸';
                playBtn.classList.add('playing');
                statusText.textContent = 'Playing...';
            });

            wavesurfer.on('pause', () => {
                playBtn.textContent = '▶';
                playBtn.classList.remove('playing');
                statusText.textContent = 'Paused - Click to resume';
            });

            wavesurfer.on('audioprocess', () => {
                const current = wavesurfer.getCurrentTime();
                currentTimeEl.textContent = formatTime(current);
                const duration = wavesurfer.getDuration();
                if (duration > 0) {
                    const percent = (current / duration) * 100;
                    progressFill.style.width = percent + '%';
                }
            });

            wavesurfer.on('seek', (pos) => {
                const duration = wavesurfer.getDuration();
                const current = duration * pos;
                currentTimeEl.textContent = formatTime(current);
            });

            wavesurfer.on('error', (msg) => {
                console.error('WaveSurfer error event:', msg);
                statusText.textContent = `Audio format not supported or file error. Check browser console.`;
                statusText.parentElement.querySelector('.status-indicator').classList.remove('loading');
            });
        }

        function setupControls() {
            playBtn.addEventListener('click', () => {
                wavesurfer.playPause();
            });

            progressBar.addEventListener('click', (e) => {
                const rect = progressBar.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                wavesurfer.seekTo(percent);
            });

            volumeSlider.addEventListener('input', (e) => {
                wavesurfer.setVolume(e.target.value / 100);
            });
        }

        async function loadRecording() {
            recordingTitle.textContent = 'demo call';
            statusText.textContent = 'Ready to play - Click the play button';
            
            // Load audio without blocking UI
            try {
                audioUrl = '/audio';
                console.log('Loading audio from:', audioUrl);
                wavesurfer.load(audioUrl);
                
                // Stop loading spinner after 1.5 seconds
                setTimeout(() => {
                    statusText.parentElement.querySelector('.status-indicator').classList.remove('loading');
                }, 1500);
            } catch (error) {
                console.error('Error loading audio:', error);
            }
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            initializeWaveSurfer();
            setupControls();
            loadRecording();
        });
    </script>
</body>
</html>
